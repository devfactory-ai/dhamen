<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Dhamen - Plateforme de tiers payant santé en Tunisie" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dhamen" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Dhamen" />
    <meta name="msapplication-TileColor" content="#1e3a5f" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dhamen - Tiers Payant Santé" />
    <meta property="og:description" content="Plateforme de gestion du tiers payant santé en Tunisie" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="fr_TN" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>Dhamen - Tiers Payant Santé</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
