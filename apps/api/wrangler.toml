name = "dhamen-api"
account_id = "6435a77d3ce17b7de468c6618e7b2b14"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
JWT_ISSUER = "dhamen"
JWT_EXPIRES_IN = "900"
REFRESH_EXPIRES_IN = "86400"

# Legacy single DB (kept for backward compatibility during migration)
[[d1_databases]]
binding = "DB"
database_name = "dhamen-db"
database_id = "83076129-b19e-49e9-a77c-6668252d38cc"
migrations_dir = "../../packages/db/migrations"

# ============================================
# MULTI-TENANT D1 DATABASES
# ============================================

# Platform database (tenant registry, super admin, cross-tenant data)
[[d1_databases]]
binding = "DB_PLATFORM"
database_name = "dhamen-platform"
database_id = "177d1c79-e45e-4d8e-8d36-7322fc4034d6"
migrations_dir = "../../packages/db/migrations"

# STAR Assurances tenant database
[[d1_databases]]
binding = "DB_STAR"
database_name = "dhamen-star"
database_id = "359616bc-cf96-4613-a06c-a784af509abf"
migrations_dir = "../../packages/db/migrations"

# GAT Assurances tenant database
[[d1_databases]]
binding = "DB_GAT"
database_name = "dhamen-gat"
database_id = "7dac8e2c-d0e5-4b89-8431-0fb54cdf8ae4"
migrations_dir = "../../packages/db/migrations"

# COMAR tenant database
[[d1_databases]]
binding = "DB_COMAR"
database_name = "dhamen-comar"
database_id = "454bd8a2-e536-47e9-bf38-fd11da820bf5"
migrations_dir = "../../packages/db/migrations"

# AMI Assurances tenant database
[[d1_databases]]
binding = "DB_AMI"
database_name = "dhamen-ami"
database_id = "7575cb4b-ae0d-4fd6-9dd3-22b467d434b7"
migrations_dir = "../../packages/db/migrations"

# ============================================
# KV NAMESPACES
# ============================================

[[kv_namespaces]]
binding = "CACHE"
id = "22194f538ced43e7aba76bc0c4dfbaaa"

# Tenant registry for fast subdomain -> tenant lookup
[[kv_namespaces]]
binding = "TENANT_REGISTRY"
id = "0b9124d8d7ea4deb97df39dc69bc3d90"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "dhamen-files"

# Durable Objects for distributed rate limiting
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# Durable Objects for real-time notifications
[[durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

# Workers AI binding
[ai]
binding = "AI"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiter"]

[[migrations]]
tag = "v2"
new_classes = ["NotificationHub"]

# Staging environment
[env.staging]
name = "dhamen-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
API_VERSION = "v1"
JWT_ISSUER = "dhamen"
JWT_EXPIRES_IN = "900"
REFRESH_EXPIRES_IN = "86400"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "dhamen-db-staging"
database_id = "7be5e065-bfba-4b94-8f7e-87226fcd2665"
migrations_dir = "../../packages/db/migrations"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "287b62ff109946bea823c4f39fde0690"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "dhamen-files-staging"

[[env.staging.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.staging.durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

[env.staging.ai]
binding = "AI"

# Production environment
# IMPORTANT: Before deploying to production, create these resources:
# 1. wrangler d1 create dhamen-db-production
# 2. wrangler kv:namespace create CACHE --env production
# 3. wrangler r2 bucket create dhamen-files-production
# 4. wrangler secret put JWT_SECRET --env production
# 5. wrangler secret put ENCRYPTION_KEY --env production
# Then update the IDs below with the actual values.

[env.production]
name = "dhamen-api-production"

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
JWT_ISSUER = "dhamen"
JWT_EXPIRES_IN = "900"
REFRESH_EXPIRES_IN = "86400"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dhamen-db-production"
database_id = "REPLACE_WITH_PRODUCTION_D1_ID"
migrations_dir = "../../packages/db/migrations"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_PRODUCTION_KV_ID"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "dhamen-files-production"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.production.durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

[env.production.ai]
binding = "AI"
