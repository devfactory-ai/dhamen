name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip E2E tests'
        required: false
        default: 'false'
        type: boolean

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20

jobs:
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

  deploy-api:
    name: Deploy API to Production
    runs-on: ubuntu-latest
    environment: production
    needs: pre-deploy-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @dhamen/shared build && pnpm --filter @dhamen/db build

      - name: Deploy API to Cloudflare Workers (Production)
        working-directory: apps/api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    name: Deploy Web to Production
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @dhamen/shared build

      - name: Build Web
        working-directory: apps/web
        run: pnpm build
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}

      - name: Deploy Web to Cloudflare Pages (Production)
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name=dhamen-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  run-migrations:
    name: Run D1 Migrations (Production)
    runs-on: ubuntu-latest
    needs: deploy-api
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run D1 Migrations
        working-directory: apps/api
        run: npx wrangler d1 migrations apply dhamen-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  post-deploy-verification:
    name: Post-deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web, run-migrations]
    steps:
      - name: Health Check API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://dhamen-api.yassine-techini.workers.dev/api/v1/health)
          if [ "$response" != "200" ]; then
            echo "API health check failed with status $response"
            exit 1
          fi
          echo "API health check passed"

      - name: Health Check Web
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://dhamen-web.pages.dev)
          if [ "$response" != "200" ]; then
            echo "Web health check failed with status $response"
            exit 1
          fi
          echo "Web health check passed"

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web, run-migrations, post-deploy-verification]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ needs.deploy-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.run-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verification | ${{ needs.post-deploy-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Production URLs:**" >> $GITHUB_STEP_SUMMARY
          echo "- API: https://dhamen-api.yassine-techini.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo "- Web: https://dhamen-web.pages.dev" >> $GITHUB_STEP_SUMMARY

  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    needs: post-deploy-verification
    if: failure()
    steps:
      - name: Rollback Instructions
        run: |
          echo "## Rollback Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Post-deployment verification failed. Manual rollback may be required." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Cloudflare Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "2. Workers & Pages -> dhamen-api -> Deployments" >> $GITHUB_STEP_SUMMARY
          echo "3. Roll back to the previous working deployment" >> $GITHUB_STEP_SUMMARY
          echo "4. For Pages, go to dhamen-web and do the same" >> $GITHUB_STEP_SUMMARY
